<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYST - Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles\myst.css">
    <link rel="icon" type="image/png" href="resources/MYST_dp.jpeg">
    
    <meta property="og:title" content="MYST - Registration">
    <meta property="og:description" content="Official Participant Registration Form for Yoga Competition By MYST. Register now!">
    <meta property="og:image" content="https://www.soumenyoga.in/resources/MYST_dp.jpeg">
    <meta property="og:url" content="https://www.soumenyoga.in/myst-registration.html">
    <meta property="og:type" content="website">
    <meta property="og:image:width" content="300">
    <meta property="og:image:height" content="300">
</head>
<body>

<div class="container">
    
    <div class="header">
        <div class="logo-container">
            <img id="orgLogo" src="" alt="Logo">
        </div>
        <h2>5th North Bengal Yogasana Chanpionship - 2K26</h2>
        <p>Organised by:- BABLA YOGA TRAINING CENTRE</p>
        <p>Participant Registration</p>
    </div>

    <div class="form-body" id="formView">
        <div id="errorMsg"></div>
        <form id="yogaForm">
            
            <div class="form-group">
                <label>👤 Name of the Candidate</label>
                <input type="text" name="name" required placeholder="Full Name">
            </div>

            <div class="form-group">
                <label>⚧ Select Sex</label>
                <select name="sex" required>
                    <option value="" disabled selected hidden>Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div id="autoAgeWrapper" style="display: none; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label>📅 Date of Birth</label>
                    <input type="date" name="dob" id="dobField">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>👤 Calculated Age</label>
                    <input type="number" name="age" id="ageField" readonly placeholder="Auto" style="background: #f0f4f8;">
                </div>
            </div>

            <div class="form-group">
                <label>🏆 Age Group</label>
                <select name="group" id="groupField" required>
                    <option value="" disabled selected hidden>Select Age Group</option>
                    </select>
            </div>

            <div class="form-group">
                <label>🧘 Coach Name</label>
                <div class="autocomplete-wrapper">
                    <input type="text" name="coach" id="coachField" required 
                           placeholder="Full Name..." autocomplete="off">
                    <div id="suggestions" class="suggestions-list"></div>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn">
                <span id="btnText">Submit Registration</span>
                <div class="loader" id="btnLoader"></div>
            </button>
        </form>
    </div>

    <div id="successView" style="display: none;">
        <p style="color: #27ae60; margin-top: 0; margin-bottom: 5px;">✅ Registration completed successfully.</p>

        <div class="sl-card">
            <div id="resultLabel" style="font-size: 0.8rem; color: #555; font-weight: normal; margin-bottom: 5px;">SL NO</div>
            <span id="slDisplay">...</span>
        </div>
        
        <p style="font-size: 0.9rem; font-weight: 600; color: #333; margin-top: 20px;">Competition Location</p>
        <div class="map-container">
            
        </div>

        <button class="btn" id="btnSameCoach" onclick="applySameCoach()" style="background: #2980b9; margin-top: 25px; display: none;">
            Register Next as Coach: <span id="lastCoachName">Current Coach</span>
        </button>

        <button class="btn" onclick="resetForm()" style="background: #34495e; margin-top: 10px;">
            Register Another (New Coach) 
        </button>
    </div>

    <div class="footer-credit">
        Powered by <a href="https://code04sohan.github.io/cv/" target="_blank"><br>Management of Yoga Sports & Tournaments</a>.<br>
        Contact <a href="https://code04sohan.github.io/cv/" target="_blank">us</a> for support.
    </div>

</div>

<script src="scripts\myst-registration.js"></script>

</body>
</html>
